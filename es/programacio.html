<head>

    <!-- ===== PWA MANIFEST ===== -->
    <link rel="manifest" href="../manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">

    <link rel="stylesheet" href="../css/styles.css?v=1.4">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- JSON-LD Structured Data: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "Comisión de Fiestas de Ares del Maestrat",
      "url": "https://www.comiares.es/es/",
      "logo": "https://www.comiares.es/img/logo.svg",
      "image": "https://www.comiares.es/img/portada.jpg",
      "description": "Web oficial de la Comisión de Fiestas de Ares del Maestrat. Organización de los actos, fiestas patronales y actividades culturales.",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Pl. Major, 9",
        "addressLocality": "Ares del Maestrat",
        "addressRegion": "Castellón",
        "addressCountry": "ES",
        "postalCode": "12165"
      }
    }
    </script>
</head>
<body>

    <!-- Dynamic Navbar Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Intro Header -->
    <div class="page-intro container">
        <h1>PROGRAMACIÓN</h1>
        <p>
            No te pierdas ninguna de las actividades programadas para las próximas fiestas. Filtra por categorías, busca los actos que más te interesen y vive el Maestrat al máximo.
        </p>
    </div>

    <!-- Filter and Search Bar -->
    <section style="border-bottom: none;">
        <div class="container" style="padding-top: 1rem; padding-bottom: 5rem;">
            <div class="filter-bar">
                <div class="filter-categories" id="categories-container">
                    <button class="filter-btn active" data-category="all">Todos los actos</button>
                    <button class="filter-btn" data-category="musica">Música</button>
                    <button class="filter-btn" data-category="cultura">Cultura</button>
                    <button class="filter-btn" data-category="menjars">Comidas</button>
                    <button class="filter-btn" data-category="populars">Populares</button>
                </div>
                
                <div style="display: flex; gap: 1rem; align-items: center; flex-wrap: wrap;">
                    <div class="search-box">
                        <i data-lucide="search" style="width: 16px; height: 16px;"></i>
                        <input type="text" id="search-input" placeholder="Buscar acto, lugar...">
                    </div>

                    <div style="display: flex; flex-direction: column; align-items: flex-end;">
                        <button class="btn btn-sm btn-secondary" id="btn-download-full-calendar" style="padding: 0.5rem 1rem; font-size: 0.75rem; display: flex; align-items: center; gap: 0.5rem; height: 38px;" title="Exporta el calendario en formato .ics compatible con Google, Apple y Outlook">
                            <i data-lucide="calendar-plus" style="width: 14px; height: 14px;"></i>
                            <span>Exportar Calendario</span>
                        </button>
                        <span style="font-size: 0.65rem; color: var(--text-muted); margin-top: 0.25rem; text-align: right; display: block; max-width: 180px;">
                            Añadir a tu calendario (Google, Apple, Outlook)
                        </span>
                    </div>
                </div>
            <!-- Timeline for Events -->
            <div class="events-timeline" id="events-timeline">
                <!-- Dynamic events loaded by programacio.js (Skeletons shown during load) -->
                <div class="timeline-day-group skeleton-card">
                    <div class="timeline-date-container">
                        <div class="skeleton skeleton-title" style="width: 40%; height: 1.75rem; margin-bottom: 0.5rem;"></div>
                        <div class="skeleton skeleton-text" style="width: 20%; height: 0.875rem;"></div>
                    </div>
                    <div class="timeline-events-list">
                        <div class="event-row">
                            <div class="event-content-col" style="flex-grow: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                                <div class="event-time-category" style="display: flex; gap: 1rem; align-items: center;">
                                    <div class="skeleton skeleton-text" style="width: 80px; height: 1rem; margin-bottom: 0;"></div>
                                    <div class="skeleton skeleton-text" style="width: 60px; height: 1rem; border-radius: 9999px; margin-bottom: 0;"></div>
                                </div>
                                <div class="skeleton skeleton-title" style="width: 60%; height: 1.25rem; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 90%; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 85%; margin-bottom: 0;"></div>
                            </div>
                        </div>
                        <div class="event-row">
                            <div class="event-content-col" style="flex-grow: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                                <div class="event-time-category" style="display: flex; gap: 1rem; align-items: center;">
                                    <div class="skeleton skeleton-text" style="width: 80px; height: 1rem; margin-bottom: 0;"></div>
                                    <div class="skeleton skeleton-text" style="width: 60px; height: 1rem; border-radius: 9999px; margin-bottom: 0;"></div>
                                </div>
                                <div class="skeleton skeleton-title" style="width: 50%; height: 1.25rem; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 95%; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 80%; margin-bottom: 0;"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="timeline-day-group skeleton-card">
                    <div class="timeline-date-container">
                        <div class="skeleton skeleton-title" style="width: 35%; height: 1.75rem; margin-bottom: 0.5rem;"></div>
                        <div class="skeleton skeleton-text" style="width: 15%; height: 0.875rem;"></div>
                    </div>
                    <div class="timeline-events-list">
                        <div class="event-row">
                            <div class="event-content-col" style="flex-grow: 1; display: flex; flex-direction: column; gap: 0.5rem;">
                                <div class="event-time-category" style="display: flex; gap: 1rem; align-items: center;">
                                    <div class="skeleton skeleton-text" style="width: 80px; height: 1rem; margin-bottom: 0;"></div>
                                    <div class="skeleton skeleton-text" style="width: 60px; height: 1rem; border-radius: 9999px; margin-bottom: 0;"></div>
                                </div>
                                <div class="skeleton skeleton-title" style="width: 55%; height: 1.25rem; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 90%; margin-bottom: 0.25rem;"></div>
                                <div class="skeleton skeleton-text" style="width: 75%; margin-bottom: 0;"></div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Event Detail Modal -->
    <div id="event-detail-modal" class="event-modal-overlay">
        <div class="event-modal-card">
            <button class="event-modal-close-btn" id="event-detail-close">&times;</button>
            <div id="event-detail-modal-body"></div>
        </div>
    </div>

    <!-- Dynamic Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="../js/db.js" defer></script>
    <script src="../js/main.js?v=1.1" defer></script>
    <script src="../js/programacio.js" defer></script>
</body>
</html>
