    <script>
        let currentGallery = [];
        let currentImgIndex = 0;

        function parseImageUrlAndAlt(imageStr) {
            if (!imageStr) return { url: '', alt: '' };
            const hashIdx = imageStr.indexOf('#alt=');
            const isEs = window.location.pathname.includes('/es/');
            if (hashIdx !== -1) {
                const url = imageStr.substring(0, hashIdx);
                const searchParamsStr = imageStr.substring(hashIdx + 1);
                const params = new URLSearchParams(searchParamsStr);
                const altVal = isEs ? (params.get('alt_es') || params.get('alt')) : params.get('alt');
                return {
                    url: window.getAssetPath(url),
                    alt: altVal ? decodeURIComponent(altVal) : ''
                };
            }
            return { url: window.getAssetPath(imageStr), alt: '' };
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Wait for DB initialization
            setTimeout(async () => {
                await route();
            }, 100);

            // Popstate listener to handle back navigation in news
            window.addEventListener('popstate', async () => {
                await route();
            });

            // Set up lightbox event listeners
            const lightbox = document.getElementById('news-lightbox');
            const lightboxImg = document.getElementById('news-lightbox-img');
            const caption = document.getElementById('news-lightbox-caption');
            const closeBtn = document.getElementById('news-lightbox-close');
            const prevBtn = document.getElementById('news-lightbox-prev');
            const nextBtn = document.getElementById('news-lightbox-next');
            
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    lightbox.classList.remove('active');
                });
            }
            
            if (lightbox) {
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
                        lightbox.classList.remove('active');
                    }
                });
            }
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    if (currentGallery.length === 0) return;
                    currentImgIndex = (currentImgIndex - 1 + currentGallery.length) % currentGallery.length;
                    const item = currentGallery[currentImgIndex];
                    lightboxImg.src = item.url;
                    if (caption) caption.textContent = item.alt || '';
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (currentGallery.length === 0) return;
                    currentImgIndex = (currentImgIndex + 1) % currentGallery.length;
                    const item = currentGallery[currentImgIndex];
                    lightboxImg.src = item.url;
                    if (caption) caption.textContent = item.alt || '';
                });
            }
        });

        async function route() {
            const urlParams = new URLSearchParams(window.location.search);
            const newsId = urlParams.get('id');
            
            // Extraure el slug del pathname per a suportar clean URLs (ej. /noticies/slug-name/)
            const pathParts = window.location.pathname.split('/').filter(p => p);
            const noticiesIndex = pathParts.findIndex(p => p.startsWith('noticies'));
            const pathSlug = (noticiesIndex !== -1 && pathParts.length > noticiesIndex + 1) ? pathParts[noticiesIndex + 1] : null;
            
            const slug = window.staticArticleSlug || pathSlug || urlParams.get('slug') || urlParams.get('n');
            
            if (newsId) {
                await renderNewsDetail(newsId, null);
            } else if (slug) {
                await renderNewsDetail(null, slug);
            } else {
                await renderNewsList();
            }
            window.scrollTo(0, 0);
        }

        async function renderNewsList() {
            const listContainer = document.getElementById('news-list-view');
            const detailContainer = document.getElementById('news-detail-view');
            const isEs = window.location.pathname.includes('/es/');
            
            listContainer.style.display = 'block';
            detailContainer.style.display = 'none';
            
            // Remove any dynamic news schema if we are showing the news list
            const oldSchema = document.getElementById('dynamic-news-schema');
            if (oldSchema) {
                oldSchema.remove();
            }
            
            const container = document.getElementById('news-grid-container');
            container.innerHTML = window.getNewsSkeletonHTML(6);
            
            try {
                const newsList = await window.db.getNews();
                
                // Filter out drafts
                const publicNewsList = (newsList || []).filter(item => (item.status || 'published') !== 'draft');

                if (publicNewsList && publicNewsList.length > 0) {
                    container.innerHTML = publicNewsList.map((item, idx) => {
                        const title = isEs && item.title_es ? item.title_es : item.title;
                        const subtitle = isEs && item.subtitle_es ? item.subtitle_es : item.subtitle;
                        const imageAlt = isEs && item.image_alt_es ? item.image_alt_es : item.image_alt;
                        const slug = isEs && item.slug_es ? item.slug_es : item.slug;

                        const escTitle = window.db.escapeHTML(title);
                        const escSubtitle = window.db.escapeHTML(subtitle || '');
                        const escAlt = imageAlt ? window.db.escapeHTML(imageAlt) : escTitle;
                        const escSlug = slug ? window.db.escapeHTML(slug) : '';
                        const escId = window.db.escapeHTML(item.id);
                        const imgSrc = window.getAssetPath(item.image_url) || 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=800';
                        const readMoreText = isEs ? 'Leer más' : 'Llegir més';

                        return `
                            <article class="news-card animate-fade-in-up" style="cursor: pointer; transition-delay: ${idx * 0.05}s;" onclick="navigateToNews('${escId}', '${escSlug}')">
                                <div class="news-img-wrapper">
                                    ${window.getNewsImageHTML(item.image_url, escAlt)}
                                </div>
                                <div class="news-info">
                                    <span class="news-date">${formatDate(item.created_at)}</span>
                                    <h3 class="news-title" style="margin-top: 0.5rem; margin-bottom: 0.5rem; font-family: var(--font-heading); font-size: 1.25rem;">${escTitle}</h3>
                                    <p class="news-excerpt" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.5rem;">${escSubtitle}</p>
                                    <span class="news-more" style="margin-top: auto; font-weight:700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;">${readMoreText} &rarr;</span>
                                </div>
                            </article>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = isEs
                        ? '<div style="text-align: center; padding: 4rem; color: var(--text-muted);">No hay noticias publicadas.</div>'
                        : '<div style="text-align: center; padding: 4rem; color: var(--text-muted);">No hi ha notícies publicades.</div>';
                }
            } catch (e) {
                console.error("Error rendering news list:", e);
                container.innerHTML = isEs
                    ? '<div style="text-align: center; padding: 4rem; color: red;">Error al cargar las noticias.</div>'
                    : '<div style="text-align: center; padding: 4rem; color: red;">Error al carregar les notícies.</div>';
            }
        }

        async function renderNewsDetail(id, slug) {
            const listContainer = document.getElementById('news-list-view');
            const detailContainer = document.getElementById('news-detail-view');
            const isEs = window.location.pathname.includes('/es/');
            
            listContainer.style.display = 'none';
            detailContainer.style.display = 'block';
            
            detailContainer.innerHTML = window.getNewsDetailSkeletonHTML();
            
            try {
                const newsList = await window.db.getNews();
                const article = id 
                    ? newsList.find(n => n.id === id)
                    : newsList.find(n => n.slug === slug || n.slug_es === slug);
                
                if (!article || article.status === 'draft') {
                    const errorTitle = isEs ? "No se ha encontrado la noticia" : "No s'ha trobat la notícia";
                    const errorText = isEs 
                        ? "El artículo que buscas no existe, es un borrador o ha sido borrado."
                        : "L'article que busques no existeix, és un esborrany o ha estat esborrat.";
                    const backText = isEs ? "Volver a noticias" : "Tornar a notícies";

                    detailContainer.innerHTML = `
                        <div class="container" style="text-align: center; padding: 8rem 2rem;">
                            <h2>${errorTitle}</h2>
                            <p>${errorText}</p>
                            <a href="#" class="btn" style="margin-top: 2rem;" onclick="event.preventDefault(); navigateToNews(null)">${backText}</a>
                        </div>
                    `;
                    return;
                }

                // Find recommendation ("Tal vez te interese...")
                let recommendationHTML = '';
                const choices = (newsList || []).filter(n => n.id !== article.id && (n.status || 'published') !== 'draft');
                if (choices.length > 0) {
                    let recommendedArticle = null;
                    if (article.tags && article.tags.length > 0) {
                        const related = choices.filter(n => n.tags && n.tags.some(t => article.tags.includes(t)));
                        if (related.length > 0) {
                            related.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                            recommendedArticle = related[0];
                        }
                    }
                    if (!recommendedArticle) {
                        choices.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
                        recommendedArticle = choices[0];
                    }

                    if (recommendedArticle) {
                        const recTitle = isEs && recommendedArticle.title_es ? recommendedArticle.title_es : recommendedArticle.title;
                        const recSubtitle = isEs && recommendedArticle.subtitle_es ? recommendedArticle.subtitle_es : recommendedArticle.subtitle;
                        const recExcerpt = recSubtitle || stripHTML(isEs && recommendedArticle.content_es ? recommendedArticle.content_es : recommendedArticle.content).substring(0, 100) + '...';
                        const recSlug = isEs && recommendedArticle.slug_es ? recommendedArticle.slug_es : recommendedArticle.slug;
                        const recAlt = (isEs && recommendedArticle.image_alt_es ? recommendedArticle.image_alt_es : recommendedArticle.image_alt) || recTitle;
                        
                        const escRecTitle = window.db.escapeHTML(recTitle);
                        const escRecExcerpt = window.db.escapeHTML(recExcerpt);
                        const escRecSlug = recSlug ? window.db.escapeHTML(recSlug) : '';
                        const escRecAlt = window.db.escapeHTML(recAlt);
                        const escRecId = window.db.escapeHTML(recommendedArticle.id);

                        const sectionTitle = isEs ? "Tal vez te interese..." : "També et pot interessar...";
                        const readMoreText = isEs ? "Leer más" : "Llegir més";

                        recommendationHTML = `
                            <div class="news-recommendation-section" style="margin-top: 5rem; border-top: 1px solid var(--border-color); padding-top: 3rem;">
                                <h3 style="font-family: var(--font-heading); margin-bottom: 2rem; text-transform: uppercase; font-size: 1.25rem; color: #27272a;">
                                    ${sectionTitle}
                                </h3>
                                <article class="news-card" style="cursor: pointer;" onclick="event.preventDefault(); navigateToNews('${escRecId}', '${escRecSlug}')">
                                    <div class="news-img-wrapper">
                                        ${window.getNewsImageHTML(recommendedArticle.image_url, escRecAlt)}
                                    </div>
                                    <div class="news-info">
                                        <span class="news-date">${formatDate(recommendedArticle.created_at)}</span>
                                        <h3 class="news-title" style="margin-top: 0.5rem; margin-bottom: 0.5rem; font-size: 1.2rem;">${escRecTitle}</h3>
                                        <p class="news-excerpt" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; line-height: 1.4; font-size: 0.875rem; margin-bottom: 1rem;">${escRecExcerpt}</p>
                                        <span class="news-more" style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; display: inline-flex; align-items: center; gap: 0.25rem;">
                                            ${readMoreText} <i data-lucide="arrow-right" style="width: 14px; height: 14px;"></i>
                                        </span>
                                    </div>
                                </article>
                            </div>
                        `;
                    }
                }
                
                // Render additional images if any
                let additionalImagesHTML = '';
                if (article.additional_images && article.additional_images.length > 0) {
                    const galleryTitle = isEs ? "Galería de Imágenes" : "Galeria d'Imatges";
                    additionalImagesHTML = `
                        <div style="margin-top: 4rem;">
                            <h3 style="font-family: var(--font-heading); margin-bottom: 1.5rem; text-transform: uppercase; font-size: 1.25rem;">${galleryTitle}</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;">
                                ${article.additional_images.map((img, idx) => {
                                    const { url, alt } = parseImageUrlAndAlt(img);
                                    const escAlt = alt ? window.db.escapeHTML(alt) : `Imagen adicional ${idx + 1}`;
                                    return `
                                        <div class="gallery-item-wrapper" style="overflow: hidden; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer;" onclick="openArticleLightbox(${idx})">
                                            ${window.getNewsImageHTML(url, escAlt, 'width: 100%; height: 160px; display: block; object-fit: cover; transition: var(--transition);', 'gallery-thumb-img')}
                                        </div>
                                    `;
                                }).join('')}
                            </div>
                        </div>
                    `;
                    currentGallery = article.additional_images.map(img => parseImageUrlAndAlt(img));
                } else {
                    currentGallery = [];
                }
                
                let editDateHTML = '';
                if (article.updated_at) {
                    const editedText = isEs ? 'Editado el' : 'Editat el';
                    editDateHTML = `<span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 1.5rem;">(${editedText} ${formatDate(article.updated_at)})</span>`;
                }

                const title = isEs && article.title_es ? article.title_es : article.title;
                const subtitle = isEs && article.subtitle_es ? article.subtitle_es : article.subtitle;
                const content = isEs && article.content_es ? article.content_es : article.content;
                const imageAlt = isEs && article.image_alt_es ? article.image_alt_es : article.image_alt;
                const author = isEs ? 'Comisión de Fiestas' : (article.author || 'Comissió de Festes');
                const slugForShare = isEs && article.slug_es ? article.slug_es : article.slug;

                const escTitle = window.db.escapeHTML(title);
                const escSubtitle = window.db.escapeHTML(subtitle || '');
                const escAuthor = window.db.escapeHTML(author);
                const escId = window.db.escapeHTML(article.id);
                const escAlt = imageAlt ? window.db.escapeHTML(imageAlt) : escTitle;
                const sanitizedContent = window.db.sanitizeHTML(content);
                // Enllaç per compartir l'article directament (URL neta estàtica)
                const shareUrl = slugForShare 
                    ? window.location.origin + (isEs ? '/es/noticies/' : '/noticies/') + slugForShare + '/'
                    : window.location.origin + window.location.pathname + '?id=' + escId;
                const imgSrc = window.getAssetPath(article.image_url) || 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=800';
                const backToListText = isEs ? "Volver a noticias" : "Tornar a notícies";
                const shareText = isEs ? "Compartir" : "Compartir";
                const whatsappSharePrefix = isEs ? 'Mira esta noticia de la Comisión de Ares: ' : 'Mira aquesta notícia de la Comissió d\'Ares: ';

                let tagsHTML = '';
                if (article.tags && article.tags.length > 0) {
                    tagsHTML = `
                        <div class="news-tags-container" style="margin-bottom: 2rem; margin-top: -1.5rem;">
                            ${article.tags.map(tag => `
                                <span class="news-tag-pill">#${window.db.escapeHTML(tag)}</span>
                            `).join('')}
                        </div>
                    `;
                }

                detailContainer.innerHTML = `
                    <article class="container animate-fade-in-up" style="padding-top: calc(var(--header-height) + 2rem); padding-bottom: 8rem; max-width: 800px;">
                        <a href="#" style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; margin-bottom: 2rem; color: var(--text-secondary); text-decoration: underline;" onclick="event.preventDefault(); navigateToNews(null)">
                            &larr; ${backToListText}
                        </a>
                        
                        <h1 style="font-family: var(--font-heading); font-weight: 900; line-height: 1.1; margin-bottom: 1rem; color: #27272a; font-size: clamp(2rem, 5vw, 3.25rem);">
                            ${escTitle}
                        </h1>
                        
                        <p style="font-size: 1.25rem; color: var(--text-secondary); font-weight: 300; margin-bottom: 2rem; line-height: 1.5;">
                            ${escSubtitle}
                        </p>
                        
                        <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 1rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 2.5rem;">
                            <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem;">
                                <span style="font-weight: 700; color: var(--text-primary);">${escAuthor}</span>
                                <span style="color: var(--text-muted); margin: 0 0.5rem;">•</span>
                                <span style="color: var(--text-secondary);">${formatDate(article.created_at)}</span>
                                ${editDateHTML}
                            </div>
                            <div style="display: flex; align-items: center; gap: 0.5rem;">
                                <span style="font-size: 0.75rem; text-transform: uppercase; font-weight: 700; color: var(--text-secondary); letter-spacing: 0.05em; margin-right: 0.25rem;">${shareText}:</span>
                                <a href="https://api.whatsapp.com/send?text=${encodeURIComponent(whatsappSharePrefix + title + ' ' + shareUrl)}" target="_blank" class="share-btn" title="Compartir a WhatsApp" style="width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary);">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M.057 24l1.687-6.163c-1.041-1.804-1.588-3.849-1.587-5.946C.06 5.348 5.397.01 12.008.01c3.202.001 6.212 1.246 8.477 3.514 2.266 2.268 3.507 5.28 3.505 8.484-.004 6.657-5.34 11.997-11.953 11.997-2.005-.001-3.973-.502-5.724-1.455L0 24zm6.59-4.846c1.6.95 3.188 1.449 4.825 1.451 5.436 0 9.86-4.37 9.864-9.799.002-2.63-1.023-5.101-2.885-6.97C16.528 2.008 14.069.99 11.45.99c-5.442 0-9.87 4.372-9.874 9.802-.001 1.761.47 3.477 1.365 5.011L1.879 20.8l5.205-1.353-.437-.293zm10.334-7.054c-.266-.134-1.579-.78-1.822-.867-.243-.088-.419-.132-.596.134-.176.265-.683.867-.838 1.045-.155.177-.31.198-.576.065-.265-.134-1.122-.414-2.138-1.32-.79-.705-1.325-1.577-1.48-1.842-.155-.265-.017-.409.116-.541.12-.12.266-.31.398-.464.133-.155.177-.265.265-.442.088-.177.044-.332-.021-.464-.067-.134-.596-1.439-.817-1.97-.216-.518-.433-.448-.596-.456-.153-.008-.33-.008-.508-.008-.177 0-.464.067-.707.31-.243.243-.928.907-.928 2.21 0 1.302.946 2.562 1.078 2.739.133.177 1.86 2.84 4.507 3.986.63.273 1.121.437 1.506.559.633.201 1.21.173 1.665.105.508-.076 1.579-.646 1.8-.1.222-.546.222-1.017.155-1.105-.067-.088-.243-.134-.51-.266z"/></svg>
                                </a>
                                <a href="https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn" title="Compartir a Facebook" style="width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary);">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z"/></svg>
                                </a>
                                <a href="https://twitter.com/intent/tweet?text=${encodeURIComponent(title)}&url=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn" title="Compartir a X" style="width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary);">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-5.214-6.817L4.99 21.75H1.68l7.73-8.835L1.254 2.25H8.08l4.713 6.231zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
                                </a>
                                <a href="https://www.linkedin.com/sharing/share-offsite/?url=${encodeURIComponent(shareUrl)}" target="_blank" class="share-btn" title="Compartir a LinkedIn" style="width: 32px; height: 32px; display: inline-flex; align-items: center; justify-content: center; border: 1px solid var(--border-color); border-radius: 6px; background-color: var(--bg-primary); color: var(--text-primary);">
                                    <svg viewBox="0 0 24 24" width="16" height="16" fill="currentColor"><path d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433c-1.144 0-2.063-.926-2.063-2.065 0-1.138.92-2.063 2.063-2.063 1.14 0 2.064.925 2.064 2.063 0 1.139-.925 2.065-2.064 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.225 0h.003z"/></svg>
                                </a>
                            </div>
                        </div>

                        ${tagsHTML}
                        
                        <div style="width: 100%; margin-bottom: 3rem; overflow: hidden; border-radius: 8px; border: 1px solid var(--border-color);">
                            ${window.getNewsImageHTML(article.image_url, escAlt, 'width: 100%; height: auto; display: block; max-height: 480px; object-fit: cover;')}
                        </div>
                        
                        <div class="news-body-text" style="font-size: 1.1rem; line-height: 1.8; color: var(--text-primary); font-weight: 300;">
                            ${(() => {
                                const hasHTML = /<[a-z][\s\S]*>/i.test(sanitizedContent);
                                if (hasHTML) {
                                    return sanitizedContent;
                                } else {
                                    return sanitizedContent.split('\n').map(p => p.trim() ? `<p style="margin-bottom: 1.5rem;">${p}</p>` : '').join('');
                                }
                            })()}
                        </div>
                        
                        ${additionalImagesHTML}
                        ${recommendationHTML}
                    </article>
                `;
                
                // Inject Dynamic JSON-LD NewsArticle schema
                const oldSchema = document.getElementById('dynamic-news-schema');
                if (oldSchema) {
                    oldSchema.remove();
                }

                const schemaData = {
                    "@context": "https://schema.org",
                    "@type": "NewsArticle",
                    "headline": title,
                    "description": subtitle || title,
                    "image": [imgSrc],
                    "datePublished": article.created_at,
                    "dateModified": article.updated_at || article.created_at,
                    "author": [{
                        "@type": "Organization",
                        "name": author,
                        "url": window.location.origin + "/"
                    }],
                    "publisher": {
                        "@type": "Organization",
                        "name": isEs ? "Comisión de Fiestas de Ares del Maestrat" : "Comissió de Festes d'Ares del Maestrat",
                        "logo": {
                            "@type": "ImageObject",
                            "url": window.location.origin + "/img/logo.svg"
                        }
                    },
                    "mainEntityOfPage": shareUrl
                };

                const scriptNode = document.createElement('script');
                scriptNode.id = 'dynamic-news-schema';
                scriptNode.type = 'application/ld+json';
                scriptNode.text = JSON.stringify(schemaData);
                document.head.appendChild(scriptNode);

                // Refresh Lucide Icons inside the dynamically loaded container if any
                if (window.lucide) window.lucide.createIcons();
                
            } catch (e) {
                console.error("Error loading news detail:", e);
                detailContainer.innerHTML = isEs
                    ? '<div style="text-align: center; padding: 8rem 0; color: red;">Error al cargar el detalle de la noticia.</div>'
                    : '<div style="text-align: center; padding: 8rem 0; color: red;">Error al carregar el detall de la notícia.</div>';
            }
        }

        function navigateToNews(id, slug) {
            const isEs = window.location.pathname.includes('/es/');
            const base = isEs ? '/es/noticies' : '/noticies';
            let url = base;
            if (slug) {
                url = isEs ? `/es/noticies/${slug}/` : `/noticies/${slug}/`;
            } else if (id) {
                url = `${base}?id=${id}`;
            }
            window.history.pushState({}, '', url);
            route();
        }

        function openArticleLightbox(index) {
            const lightbox = document.getElementById('news-lightbox');
            const lightboxImg = document.getElementById('news-lightbox-img');
            const caption = document.getElementById('news-lightbox-caption');
            if (!lightbox || !lightboxImg || currentGallery.length === 0) return;
            
            currentImgIndex = index;
            const item = currentGallery[currentImgIndex];
            lightboxImg.src = item.url;
            if (caption) caption.textContent = item.alt || '';
            lightbox.classList.add('active');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            const isEs = window.location.pathname.includes('/es/');
            return date.toLocaleDateString(isEs ? 'es-ES' : 'ca-ES', options);
        }

        function stripHTML(html) {
            if (!html) return '';
            const doc = new DOMParser().parseFromString(html, 'text/html');
            return doc.body.textContent || "";
        }
    </script>
