<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="alternate" hreflang="ca" href="https://www.comiares.es/galeria">
    <link rel="alternate" hreflang="ca-ES" href="https://www.comiares.es/galeria">
    <link rel="alternate" hreflang="es" href="https://www.comiares.es/es/galeria">
    <link rel="alternate" hreflang="es-ES" href="https://www.comiares.es/es/galeria">
    <link rel="alternate" hreflang="x-default" href="https://www.comiares.es/galeria">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://www.comiares.es/es/galeria">
    <meta property="og:title" content="Galería de Fotos de Ares del Maestrat | Recordando las Fiestas">
    <meta property="og:description" content="Revive en imágenes los mejores momentos de nuestras fiestas, el tradicional Ball Pla y las actividades populares en Ares del Maestrat.">
    <meta property="og:image" content="https://www.comiares.es/img/ballpla1.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://www.comiares.es/es/galeria">
    <meta property="twitter:title" content="Galería de Fotos de Ares del Maestrat | Recordando las Fiestas">
    <meta property="twitter:description" content="Revive en imágenes los mejores momentos de nuestras fiestas, el tradicional Ball Pla y las actividades populares en Ares del Maestrat.">
    <meta property="twitter:image" content="https://www.comiares.es/img/ballpla1.jpg">
    

    <!-- ===== PWA MANIFEST ===== -->
    <link rel="manifest" href="/manifest.json">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="Fiestas Ares">
    <meta name="theme-color" content="#ffffff">
    <link rel="apple-touch-icon" href="/img/icon-512.svg">
    <!-- Stylesheets -->
    <link rel="stylesheet" href="/css/styles.css?v=1.4">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest" defer></script>

    <!-- JSON-LD Structured Data: ImageGallery -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ImageGallery",
      "name": "Galería de Fotos de Ares del Maestrat | Recordando las Fiestas",
      "description": "Revive en imágenes los mejores momentos de nuestras fiestas, el tradicional Ball Pla y las actividades populares en Ares del Maestrat.",
      "url": "https://www.comiares.es/es/galeria",
      "creator": {
        "@type": "Organization",
        "name": "Comisión de Fiestas de Ares del Maestrat",
        "url": "https://www.comiares.es/es/"
      }
    }
    </script>
</head>
<body>

    <!-- Dynamic Navbar Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Intro Header -->
    <div class="page-intro container">
        <h1>GALERÍA DE FOTOS</h1>
        <p>
            Revive los mejores momentos de las fiestas y eventos organizados por la Comisión. Un recorrido visual por nuestras tradiciones, nuestro patrimonio y nuestra gente.
        </p>
    </div>

    <!-- Gallery Section -->
    <section style="border-bottom: none;">
        <div class="container" style="padding-top: 1rem; padding-bottom: 8rem;">
            <!-- Filters Bar -->
            <div class="filter-bar">
                <div class="filter-categories" id="gallery-categories">
                    <!-- Loaded dynamically -->
                    <button class="filter-btn active" data-category="all">Todas</button>
                </div>
            </div>

            <div class="gallery-grid" id="gallery-grid">
                <!-- Loaded dynamically (Skeletons shown during load) -->
                <div class="gallery-item wide skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item tall skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item wide skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</button>
        <div class="lightbox-content">
            <img src="" id="lightbox-img" alt="Imagen ampliada">
            <div class="lightbox-caption" id="lightbox-caption">Título de la foto</div>
        </div>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</button>
    </div>

    <!-- Dynamic Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2" defer></script>
    <script src="/js/db.js" defer></script>
    <script src="/js/main.js?v=1.6" defer></script>
    <script src="../js/galeria.js" defer></script>
</body>
</html>
