<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor de Notícies | Comissió de Festes d'Ares del Maestrat</title>
    <meta name="robots" content="noindex, nofollow">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="../css/styles.css">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    
    <style>
        body {
            background-color: var(--bg-secondary);
        }
        .editor-container {
            max-width: 900px;
            margin: 2rem auto 6rem auto;
            padding: 3rem;
            border: 1px solid var(--border-color);
            background-color: var(--bg-primary);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.02);
            border-radius: 8px;
        }
        .editor-btn-group {
            display: flex;
            gap: 1rem;
            margin-top: 3rem;
            border-top: 1px solid var(--border-color);
            padding-top: 2rem;
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="main-header" style="position: static; margin-bottom: 2rem; background-color: var(--bg-primary);">
        <div class="container" style="display: flex; align-items: center; justify-content: space-between; height: var(--header-height); max-width: 100%; padding: 0 4rem;">
            <a href="index.html" class="logo" style="display: flex; align-items: center; height: 100%;">
                <img src="../img/logo.svg" alt="Logo Comissió Ares" style="height: 40px; width: auto;">
            </a>
            <span style="font-family: var(--font-heading); font-weight: 700; text-transform: uppercase; font-size: 0.8rem; letter-spacing: 0.05em; border-bottom: 2px solid var(--text-primary); padding-bottom: 0.25rem;">
                Editor de Notícies
            </span>
        </div>
    </header>

    <div class="container">
        <div class="editor-container">
            <h1 id="editor-page-title" style="font-size: 2.25rem; text-transform: uppercase; margin-bottom: 2rem; border-bottom: 1px solid var(--border-color); padding-bottom: 1rem; font-family: var(--font-heading); color: var(--text-primary);">
                Nova Notícia
            </h1>

            <form id="form-editor-news">
                <input type="hidden" id="news-id">
                
                <div class="form-group">
                    <label for="news-title">Títol de la notícia</label>
                    <input type="text" id="news-title" required placeholder="Ex. Ja tenim el programa a la venda" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; font-size: 1.25rem; font-family: var(--font-heading); font-weight: 700; background-color: var(--bg-secondary);">
                </div>
                
                <div class="form-group">
                    <label for="news-subtitle">Subtítol o Resum Curt</label>
                    <input type="text" id="news-subtitle" placeholder="Ex. Sorteig especial el 22 de desembre" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-secondary);">
                </div>

                <div style="display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1.5rem;">
                    <div class="form-group">
                        <label for="news-author">Autor de la notícia</label>
                        <input type="text" id="news-author" placeholder="Ex. Comissió de Festes" value="Comissió de Festes" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-secondary);">
                    </div>
                    <div class="form-group">
                        <label for="news-date">Data de publicació</label>
                        <input type="date" id="news-date" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-heading); background-color: var(--bg-secondary);">
                    </div>
                    <div class="form-group">
                        <label for="news-edit-date">Data d'edició (Opcional)</label>
                        <input type="date" id="news-edit-date" style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; font-family: var(--font-heading); background-color: var(--bg-secondary);">
                    </div>
                </div>

                <div class="form-group">
                    <label for="news-image">URL de la imatge de portada (Opcional si es puja fitxer)</label>
                    <input type="url" id="news-image" placeholder="https://images.unsplash.com/..." style="width: 100%; padding: 0.8rem 1rem; border: 1px solid var(--border-color); border-radius: 8px; background-color: var(--bg-secondary);">
                </div>

                <div class="form-group">
                    <label for="news-image-file">O puja una foto de portada</label>
                    <input type="file" id="news-image-file" accept="image/*" style="border: none; padding: 0.5rem 0; display: block;">
                    <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 300; display: block; margin-top: 0.25rem;">Mida recomanada: 1200x675 píxels (proporció 16:9) en format JPG, PNG o WebP.</span>
                </div>

                <div class="form-group">
                    <label for="news-editor">Contingut del text de la notícia</label>
                    <!-- Rich Text Editor Toolbar -->
                    <div class="editor-toolbar" style="display: flex; gap: 0.5rem; margin-bottom: 0.5rem; border: 1px solid var(--border-color); padding: 0.75rem; border-radius: 8px 8px 0 0; background-color: var(--bg-secondary); flex-wrap: wrap; align-items: center;">
                        <button type="button" class="editor-btn" data-cmd="bold" title="Negreta" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-weight: 900; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary);">B</button>
                        <button type="button" class="editor-btn" data-cmd="italic" title="Cursiva" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-style: italic; font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary);">I</button>
                        <button type="button" class="editor-btn" data-cmd="underline" title="Subratllat" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); text-decoration: underline; font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary);">U</button>
                        <select class="editor-select" id="editor-heading-select" title="Estil de text" style="padding: 0 0.5rem; font-size: 0.8rem; font-family: var(--font-heading); background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; height: 32px; color: var(--text-primary); outline: none; margin-right: 0.25rem;">
                            <option value="p">Paràgraf</option>
                            <option value="h2">Títol H2</option>
                            <option value="h3">Títol H3</option>
                        </select>
                        <button type="button" class="editor-btn" data-cmd="insertUnorderedList" title="Llista de viñetes" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary); gap: 0.25rem;"><i data-lucide="list" style="width: 14px; height: 14px;"></i> Viñetes</button>
                        <button type="button" class="editor-btn" data-cmd="createLink" title="Afegir Enllaç" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary); gap: 0.25rem;"><i data-lucide="link" style="width: 14px; height: 14px;"></i> Enllaç</button>
                        <button type="button" class="editor-btn" data-cmd="unlink" title="Eliminar Enllaç" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary); gap: 0.25rem;"><i data-lucide="link-2-off" style="width: 14px; height: 14px;"></i> Traure</button>
                        <button type="button" class="editor-btn" data-cmd="removeFormat" title="Netejar Format" style="padding: 0.35rem 0.75rem; font-size: 0.85rem; font-family: var(--font-heading); font-weight: 700; background-color: var(--bg-primary); border: 1px solid var(--border-color); border-radius: 6px; cursor: pointer; display: inline-flex; align-items: center; min-width: auto; height: 32px; color: var(--text-primary); gap: 0.25rem;"><i data-lucide="eraser" style="width: 14px; height: 14px;"></i> Netejar</button>
                    </div>
                    <!-- Editor Area -->
                    <div id="news-editor" contenteditable="true" style="min-height: 400px; max-height: 700px; overflow-y: auto; padding: 1.5rem; border: 1px solid var(--border-color); border-top: none; border-radius: 0 0 8px 8px; background-color: var(--bg-primary); font-family: var(--font-body); font-weight: 300; line-height: 1.8; outline: none;"></div>
                    <textarea id="news-content" style="display: none;"></textarea>
                </div>

                <div class="form-group">
                    <label for="news-additional-files">Pujar imatges addicionals per a la galeria interna (Opcional)</label>
                    <input type="file" id="news-additional-files" accept="image/*" multiple style="border: none; padding: 0.5rem 0; display: block;">
                    <span style="font-size: 0.75rem; color: var(--text-secondary); font-weight: 300; display: block; margin-top: 0.25rem;">Mida recomanada: fins a 1200 píxels al costat més llarg en format JPG, PNG o WebP.</span>
                </div>

                <div class="form-group" id="existing-additional-images-group" style="display: none; margin-bottom: 2rem;">
                    <label style="font-weight: 700;">Imatges addicionals actuals (clica a la creu per esborrar-ne)</label>
                    <div id="existing-additional-images-container" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 1rem; margin-top: 0.75rem;"></div>
                </div>
                
                <div class="editor-btn-group">
                    <button type="submit" class="btn" id="btn-save-news">Guardar Notícia</button>
                    <button type="button" class="btn btn-secondary" onclick="window.close()">Tancar Editor</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Scripts -->
    <script src="../js/db.js"></script>
    <script>
        let currentAdditionalImages = [];

        document.addEventListener('DOMContentLoaded', () => {
            // Setup rich text editor
            initRichTextEditor();

            // Load news content if ID is in parameters
            setTimeout(async () => {
                await loadNewsData();
            }, 100);

            // Handle submit
            const form = document.getElementById('form-editor-news');
            if (form) {
                form.addEventListener('submit', async (e) => {
                    e.preventDefault();
                    await saveNews();
                });
            }

            // Refresh Lucide Icons
            if (window.lucide) {
                window.lucide.createIcons();
            }
        });

        function initRichTextEditor() {
            const editorBtns = document.querySelectorAll('.editor-btn');
            const newsEditor = document.getElementById('news-editor');
            const newsContent = document.getElementById('news-content');

            editorBtns.forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const cmd = btn.getAttribute('data-cmd');
                    if (cmd === 'createLink') {
                        const url = prompt('Introdueix la URL de l\'enllaç (ej. https://google.com):');
                        if (url) {
                            document.execCommand(cmd, false, url);
                        }
                    } else {
                        document.execCommand(cmd, false, null);
                    }
                    syncEditorContent();
                });
            });

            const headingSelect = document.getElementById('editor-heading-select');
            if (headingSelect) {
                headingSelect.addEventListener('change', (e) => {
                    const val = headingSelect.value;
                    document.execCommand('formatBlock', false, `<${val}>`);
                    syncEditorContent();
                    headingSelect.value = 'p'; // Reset
                });
            }

            if (newsEditor) {
                newsEditor.addEventListener('input', syncEditorContent);
                newsEditor.addEventListener('blur', syncEditorContent);
            }

            function syncEditorContent() {
                if (newsEditor && newsContent) {
                    newsContent.value = newsEditor.innerHTML;
                }
            }
        }

        function renderExistingAdditionalImages() {
            const container = document.getElementById('existing-additional-images-container');
            const group = document.getElementById('existing-additional-images-group');
            if (!container || !group) return;

            if (currentAdditionalImages.length === 0) {
                group.style.display = 'none';
                container.innerHTML = '';
                return;
            }

            group.style.display = 'block';
            container.innerHTML = currentAdditionalImages.map((img, idx) => `
                <div style="position: relative; width: 100px; height: 100px; border: 1px solid var(--border-color); border-radius: 6px; overflow: hidden; background-color: var(--bg-secondary);">
                    <img src="${img}" style="width: 100%; height: 100%; object-fit: cover;">
                    <button type="button" class="btn-delete-existing-img" data-index="${idx}" style="position: absolute; top: 0.25rem; right: 0.25rem; background-color: rgba(239, 68, 68, 0.9); color: white; border: none; border-radius: 50%; width: 20px; height: 20px; display: flex; align-items: center; justify-content: center; cursor: pointer; font-size: 0.75rem; font-weight: 700; line-height: 1;" title="Eliminar imatge">&times;</button>
                </div>
            `).join('');

            container.querySelectorAll('.btn-delete-existing-img').forEach(btn => {
                btn.addEventListener('click', (e) => {
                    e.preventDefault();
                    const idx = parseInt(btn.getAttribute('data-index'));
                    currentAdditionalImages.splice(idx, 1);
                    renderExistingAdditionalImages();
                });
            });
        }

        async function loadNewsData() {
            const urlParams = new URLSearchParams(window.location.search);
            const newsId = urlParams.get('id');

            // Default publication date to today
            document.getElementById('news-date').value = new Date().toISOString().split('T')[0];

            if (newsId) {
                document.getElementById('editor-page-title').textContent = 'Editar Notícia';
                const newsList = await window.db.getNews();
                const item = newsList.find(n => n.id === newsId);
                
                if (item) {
                    document.getElementById('news-id').value = item.id;
                    document.getElementById('news-title').value = item.title;
                    document.getElementById('news-subtitle').value = item.subtitle || '';
                    document.getElementById('news-author').value = item.author || 'Comissió de Festes';
                    document.getElementById('news-date').value = item.created_at || '';
                    document.getElementById('news-edit-date').value = item.updated_at || '';
                    document.getElementById('news-image').value = item.image_url || '';
                    document.getElementById('news-content').value = item.content;
                    document.getElementById('news-editor').innerHTML = window.db.sanitizeHTML(item.content || '');
                    
                    currentAdditionalImages = item.additional_images || [];
                    renderExistingAdditionalImages();
                }
            }
        }

        async function saveNews() {
            const newsId = document.getElementById('news-id').value;
            const title = document.getElementById('news-title').value;
            const subtitle = document.getElementById('news-subtitle').value;
            const author = document.getElementById('news-author').value || 'Comissió de Festes';
            const created_at = document.getElementById('news-date').value || new Date().toISOString().split('T')[0];
            const updated_at = document.getElementById('news-edit-date').value || null;
            const content = document.getElementById('news-content').value;
            
            const fileInput = document.getElementById('news-image-file');
            const additionalFileInput = document.getElementById('news-additional-files');
            
            let image_url = document.getElementById('news-image').value.trim();

            const submitBtn = document.getElementById('btn-save-news');
            submitBtn.disabled = true;
            submitBtn.textContent = 'Guardant notícia...';

            try {
                // Upload primary image file
                if (fileInput && fileInput.files.length > 0) {
                    image_url = await window.db.uploadImage(fileInput.files[0]);
                }

                if (!image_url) {
                    alert("Si us plau, especifica una URL de la imatge de portada o selecciona un fitxer local.");
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Guardar Notícia';
                    return;
                }

                // Additional images (keep existing, add new)
                let additional_images = [...currentAdditionalImages];

                if (additionalFileInput && additionalFileInput.files.length > 0) {
                    const files = additionalFileInput.files;
                    for (let i = 0; i < files.length; i++) {
                        submitBtn.textContent = `Pujant imatge adicional ${i+1}/${files.length}...`;
                        const url = await window.db.uploadImage(files[i]);
                        additional_images.push(url);
                    }
                }

                const newsData = { title, subtitle, author, created_at, updated_at, content, image_url, additional_images };

                if (newsId) {
                    await window.db.editNews(newsId, newsData);
                } else {
                    await window.db.addNews(newsData);
                }

                alert('Notícia guardada correctament.');
                
                // Notify parent dashboard tab if open
                if (window.opener && !window.opener.closed) {
                    window.opener.postMessage('news-saved', '*');
                }
                window.close();
            } catch (err) {
                console.error("Error saving news:", err);
                alert("S'ha produït un error al guardar la notícia.");
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = 'Guardar Notícia';
            }
        }
    </script>
</body>
</html>
