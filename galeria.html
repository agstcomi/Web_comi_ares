    <script src="https://unpkg.com/lucide@0.469.0/dist/umd/lucide.min.js" defer></script>

    <!-- JSON-LD Structured Data: ImageGallery -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "ImageGallery",
      "name": "Galeria de Fotos d'Ares del Maestrat | Recordant les Festes",

<body>

    <!-- Dynamic Navbar Placeholder -->
    <div id="header-placeholder"></div>

    <!-- Intro Header -->
    <div class="page-intro container">
        <h1>GALERIA DE FOTOS</h1>
        <p>
            Reviu els millors moments de les festes i esdeveniments organitzats per la Comissió. Un recorregut visual per les nostres tradicions, el nostre patrimoni i la nostra gent.
        </p>
    </div>

    <!-- Gallery Section -->
    <section style="border-bottom: none;">
        <div class="container" style="padding-top: 1rem; padding-bottom: 8rem;">
            <!-- Filters Bar -->
            <div class="filter-bar">
                <div class="filter-categories" id="gallery-categories">
                    <!-- Loaded dynamically -->
                    <button class="filter-btn active" data-category="all">Totes</button>
                </div>
            </div>

            <div class="gallery-grid" id="gallery-grid">
                <!-- Loaded dynamically (Skeletons shown during load) -->
                <div class="gallery-item wide skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item tall skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item wide skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
                <div class="gallery-item skeleton" style="cursor: default; pointer-events: none;"></div>
            </div>
        </div>
    </section>

    <!-- Lightbox Modal -->
    <div class="lightbox" id="lightbox">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&#10094;</button>
        <div class="lightbox-content">
            <img src="" id="lightbox-img" alt="Imatge ampliada">
            <div class="lightbox-caption" id="lightbox-caption">Títol de la foto</div>
        </div>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&#10095;</button>
    </div>

    <!-- Dynamic Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.49.4/dist/umd/supabase.min.js" defer></script>
    <script src="/js/db.js?v=1.7" defer></script>
    <script src="/js/main.js?v=1.7" defer></script>
    <script src="js/galeria.js" defer></script>
</body>
</html>
