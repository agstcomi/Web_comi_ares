<!DOCTYPE html>
<html lang="ca">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Notícies | Comissió de Festes d'Ares del Maestrat</title>
    <meta name="description" content="Consulta totes les notícies, avisos, publicacions i esdeveniments de la Comissió de Festes d'Ares del Maestrat.">
    
    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/styles.css">
    
    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <!-- Dynamic Navbar Placeholder -->
    <div id="header-placeholder"></div>

    <!-- 1. NEWS LIST VIEW -->
    <div id="news-list-view">
        <!-- Intro Header -->
        <div class="page-intro container">
            <h1>NOTÍCIES</h1>
            <p>
                Estigues al dia dels comunicats oficials, publicacions, activitats de preparació i avisos d'última hora de la Comissió d'Ares del Maestrat.
            </p>
        </div>

        <!-- News Grid -->
        <section class="container" style="padding-top: 1rem; padding-bottom: 8rem; border-bottom: none;">
            <div class="news-grid" id="news-grid-container">
                <!-- Populated dynamically via JS -->
                <div style="grid-column: 1/-1; text-align: center; padding: 4rem; color: var(--text-muted);">
                    Carregant notícies...
                </div>
            </div>
        </section>
    </div>

    <!-- 2. NEWS DETAIL VIEW -->
    <div id="news-detail-view" style="display: none;">
        <!-- Loaded dynamically via JS -->
    </div>

    <!-- Lightbox Modal for News Gallery -->
    <div class="lightbox" id="news-lightbox">
        <button class="lightbox-close" id="news-lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="news-lightbox-prev">&#10094;</button>
        <div class="lightbox-content">
            <img src="" id="news-lightbox-img" alt="Imatge ampliada">
        </div>
        <button class="lightbox-nav lightbox-next" id="news-lightbox-next">&#10095;</button>
    </div>

    <!-- Dynamic Footer Placeholder -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <!-- Supabase JS CDN -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="js/db.js"></script>
    <script src="js/main.js"></script>
    <script>
        let currentGallery = [];
        let currentImgIndex = 0;

        document.addEventListener('DOMContentLoaded', () => {
            // Wait for DB initialization
            setTimeout(async () => {
                await route();
            }, 100);

            // Popstate listener to handle back navigation in news
            window.addEventListener('popstate', async () => {
                await route();
            });

            // Set up lightbox event listeners
            const lightbox = document.getElementById('news-lightbox');
            const lightboxImg = document.getElementById('news-lightbox-img');
            const closeBtn = document.getElementById('news-lightbox-close');
            const prevBtn = document.getElementById('news-lightbox-prev');
            const nextBtn = document.getElementById('news-lightbox-next');
            
            if (closeBtn) {
                closeBtn.addEventListener('click', () => {
                    lightbox.classList.remove('active');
                });
            }
            
            if (lightbox) {
                lightbox.addEventListener('click', (e) => {
                    if (e.target === lightbox || e.target.classList.contains('lightbox-content')) {
                        lightbox.classList.remove('active');
                    }
                });
            }
            
            if (prevBtn) {
                prevBtn.addEventListener('click', () => {
                    if (currentGallery.length === 0) return;
                    currentImgIndex = (currentImgIndex - 1 + currentGallery.length) % currentGallery.length;
                    lightboxImg.src = currentGallery[currentImgIndex];
                });
            }
            
            if (nextBtn) {
                nextBtn.addEventListener('click', () => {
                    if (currentGallery.length === 0) return;
                    currentImgIndex = (currentImgIndex + 1) % currentGallery.length;
                    lightboxImg.src = currentGallery[currentImgIndex];
                });
            }
        });

        async function route() {
            const urlParams = new URLSearchParams(window.location.search);
            const newsId = urlParams.get('id');
            
            if (newsId) {
                await renderNewsDetail(newsId);
            } else {
                await renderNewsList();
            }
            window.scrollTo(0, 0);
        }

        async function renderNewsList() {
            const listContainer = document.getElementById('news-list-view');
            const detailContainer = document.getElementById('news-detail-view');
            
            listContainer.style.display = 'block';
            detailContainer.style.display = 'none';
            
            const container = document.getElementById('news-grid-container');
            container.innerHTML = '<div style="text-align: center; padding: 4rem; color: var(--text-muted);">Carregant notícies...</div>';
            
            try {
                const newsList = await window.db.getNews();
                if (newsList && newsList.length > 0) {
                    container.innerHTML = newsList.map(item => {
                        const escTitle = window.db.escapeHTML(item.title);
                        const escSubtitle = window.db.escapeHTML(item.subtitle || '');
                        return `
                            <article class="news-card" style="cursor: pointer;" onclick="navigateToNews('${item.id}')">
                                <div class="news-img-wrapper">
                                    <img src="${item.image_url || 'https://images.unsplash.com/photo-1514525253161-7a46d19cd819?auto=format&fit=crop&q=80&w=800'}" alt="${escTitle}">
                                </div>
                                <div class="news-info">
                                    <span class="news-date">${formatDate(item.created_at)}</span>
                                    <h3 class="news-title" style="margin-top: 0.5rem; margin-bottom: 0.5rem; font-family: var(--font-heading); font-size: 1.25rem;">${escTitle}</h3>
                                    <p class="news-excerpt" style="font-size: 0.9rem; color: var(--text-secondary); line-height: 1.4; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 1.5rem;">${escSubtitle}</p>
                                    <span class="news-more" style="margin-top: auto; font-weight:700; text-transform: uppercase; font-size: 0.75rem; letter-spacing: 0.05em;">Llegir més &rarr;</span>
                                </div>
                            </article>
                        `;
                    }).join('');
                } else {
                    container.innerHTML = '<div style="text-align: center; padding: 4rem; color: var(--text-muted);">No hi ha notícies publicades.</div>';
                }
            } catch (e) {
                console.error("Error rendering news list:", e);
                container.innerHTML = '<div style="text-align: center; padding: 4rem; color: red;">Error al carregar les notícies.</div>';
            }
        }

        async function renderNewsDetail(id) {
            const listContainer = document.getElementById('news-list-view');
            const detailContainer = document.getElementById('news-detail-view');
            
            listContainer.style.display = 'none';
            detailContainer.style.display = 'block';
            
            detailContainer.innerHTML = '<div style="text-align: center; padding: 8rem 0; color: var(--text-muted);">Carregant article...</div>';
            
            try {
                const newsList = await window.db.getNews();
                const article = newsList.find(n => n.id === id);
                
                if (!article) {
                    detailContainer.innerHTML = `
                        <div class="container" style="text-align: center; padding: 8rem 2rem;">
                            <h2>No s'ha trobat la notícia</h2>
                            <p>L'article que busques no existeix o ha estat esborrat.</p>
                            <a href="#" class="btn" style="margin-top: 2rem;" onclick="event.preventDefault(); navigateToNews(null)">Tornar a notícies</a>
                        </div>
                    `;
                    return;
                }
                
                // Render additional images if any
                let additionalImagesHTML = '';
                if (article.additional_images && article.additional_images.length > 0) {
                    additionalImagesHTML = `
                        <div style="margin-top: 4rem;">
                            <h3 style="font-family: var(--font-heading); margin-bottom: 1.5rem; text-transform: uppercase; font-size: 1.25rem;">Galeria d'Imatges</h3>
                            <div style="display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 1.5rem;">
                                ${article.additional_images.map((img, idx) => `
                                    <div class="gallery-item-wrapper" style="overflow: hidden; border-radius: 8px; border: 1px solid var(--border-color); cursor: pointer;" onclick="openArticleLightbox(${idx})">
                                        <img src="${img}" alt="Imatge adicional ${idx + 1}" style="width: 100%; height: 160px; display: block; object-fit: cover; transition: var(--transition);" class="gallery-thumb-img">
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    `;
                    currentGallery = article.additional_images;
                } else {
                    currentGallery = [];
                }
                
                let editDateHTML = '';
                if (article.updated_at) {
                    editDateHTML = `<span style="color: var(--text-muted); font-size: 0.85rem; margin-left: 1.5rem;">(Editat el ${formatDate(article.updated_at)})</span>`;
                }

                const escTitle = window.db.escapeHTML(article.title);
                const escSubtitle = window.db.escapeHTML(article.subtitle || '');
                const escAuthor = window.db.escapeHTML(article.author || 'Comissió de Festes');
                const sanitizedContent = window.db.sanitizeHTML(article.content);

                detailContainer.innerHTML = `
                    <article class="container" style="padding-top: calc(var(--header-height) + 2rem); padding-bottom: 8rem; max-width: 800px;">
                        <a href="#" style="display: inline-flex; align-items: center; gap: 0.5rem; font-size: 0.9rem; margin-bottom: 2rem; color: var(--text-secondary); text-decoration: underline;" onclick="event.preventDefault(); navigateToNews(null)">
                            &larr; Tornar a notícies
                        </a>
                        
                        <h1 style="font-family: var(--font-heading); font-weight: 900; line-height: 1.1; margin-bottom: 1rem; color: #27272a; font-size: clamp(2rem, 5vw, 3.25rem);">
                            ${escTitle}
                        </h1>
                        
                        <p style="font-size: 1.25rem; color: var(--text-secondary); font-weight: 300; margin-bottom: 2rem; line-height: 1.5;">
                            ${escSubtitle}
                        </p>
                        
                        <div style="display: flex; align-items: center; flex-wrap: wrap; gap: 0.5rem; padding-bottom: 1.5rem; border-bottom: 1px solid var(--border-color); margin-bottom: 2.5rem;">
                            <span style="font-weight: 700; color: var(--text-primary);">${escAuthor}</span>
                            <span style="color: var(--text-muted); margin: 0 0.5rem;">•</span>
                            <span style="color: var(--text-secondary);">${formatDate(article.created_at)}</span>
                            ${editDateHTML}
                        </div>
                        
                        <div style="width: 100%; margin-bottom: 3rem; overflow: hidden; border-radius: 8px; border: 1px solid var(--border-color);">
                            <img src="${article.image_url}" alt="${escTitle}" style="width: 100%; height: auto; display: block; max-height: 480px; object-fit: cover;">
                        </div>
                        
                        <div class="news-body-text" style="font-size: 1.1rem; line-height: 1.8; color: var(--text-primary); font-weight: 300;">
                            ${(() => {
                                const hasHTML = /<[a-z][\s\S]*>/i.test(sanitizedContent);
                                if (hasHTML) {
                                    return sanitizedContent;
                                } else {
                                    return sanitizedContent.split('\n').map(p => p.trim() ? `<p style="margin-bottom: 1.5rem;">${p}</p>` : '').join('');
                                }
                            })()}
                        </div>
                        
                        ${additionalImagesHTML}
                    </article>
                `;
                
                // Refresh Lucide Icons inside the dynamically loaded container if any
                if (window.lucide) window.lucide.createIcons();
                
            } catch (e) {
                console.error("Error loading news detail:", e);
                detailContainer.innerHTML = '<div style="text-align: center; padding: 8rem 0; color: red;">Error al carregar el detall de la notícia.</div>';
            }
        }

        function navigateToNews(id) {
            const url = id ? `noticies.html?id=${id}` : 'noticies.html';
            window.history.pushState({}, '', url);
            route();
        }

        function openArticleLightbox(index) {
            const lightbox = document.getElementById('news-lightbox');
            const lightboxImg = document.getElementById('news-lightbox-img');
            if (!lightbox || !lightboxImg || currentGallery.length === 0) return;
            
            currentImgIndex = index;
            lightboxImg.src = currentGallery[currentImgIndex];
            lightbox.classList.add('active');
        }

        function formatDate(dateStr) {
            if (!dateStr) return '';
            const date = new Date(dateStr);
            const options = { day: 'numeric', month: 'long', year: 'numeric' };
            return date.toLocaleDateString('ca-ES', options);
        }
    </script>
</body>
</html>
